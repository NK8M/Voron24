##########################
# LED Effects Animations #
##########################

#####################
## Chamber effects ##
#####################

[led_effect calibrating_z]
autostart:              false
frame_rate:             24
leds:
    neopixel:chamber_leds
layers:
        breathing  3 1 top (0.0, 0.0, 0.35)


[led_effect homing]
leds:
    neopixel:chamber_leds
layers:
    strobe         1  1.5   add        (1.0,  0.25, 0.0)
    breathing      2  0     difference (1.0, 0.25, 0.0)
    static         1  0     top        (0.0,  0.0, 0.0)
autostart:                             false
frame_rate:                            24


[led_effect leveling]
autostart:              false
frame_rate:             24
leds:
    neopixel:chamber_leds
layers:
        breathing  3 1 top (0.5, 0.1, 0.4)


[led_effect meshing]
autostart:              false
frame_rate:             24
leds:
    neopixel:chamber_leds
layers:
        breathing  3 1 top (0.2, 1.0, 0.0)


#######################
## Tool Logo effects ##
#######################


[led_effect sb_logo_busy]
autostart:              false
frame_rate:             24
leds:
    neopixel:T0_leds
layers:
    breathing  3 1 top (1,0,0)


[led_effect sb_logo_cleaning]
autostart:              false
frame_rate:             24
leds:
    neopixel:T0_leds (1)
layers:
    breathing  3 1 top (0.0, 0.02, 0.5)


[led_effect sb_logo_heating]
leds:
    neopixel:T0_leds (1)
heater: heater_bed
autostart:                          false
frame_rate:                         24
layers:
     temperature  40 60 add (0, 0, 1),(1, 0, 1)


[led_effect sb_logo_cooling]
leds:
    neopixel:T0_leds (1)
autostart:                          false
frame_rate:                         24
layers:
     breathing  3 1 top (0, 0, 1)


[led_effect sb_logo_printing]
autostart:              false
frame_rate:             24
leds:
    neopixel:T0_leds (1)
layers:
    gradient  0.3  1 add (0.3, 0.0, 0.0),(0.3, 0.3, 0.0),(0.3, 0.1, 0.0)


[led_effect sb_logo_standby]
autostart:              false
frame_rate:             24
leds:
    neopixel:T0_leds (1)
layers:
        breathing  3 1 top (0.01, 0.01, 0.01)


[led_effect sb_logo_part_ready]
autostart:              false
frame_rate:             24
leds:
    neopixel:T0_leds (1)
layers:
        breathing  3 1 top (0.0, 1.0, 0.0)


####################
## nozzle effects ##
####################


[led_effect sb_nozzle_heating]
autostart:              false
frame_rate:             24
leds:
    neopixel:T0_leds (2,3)
layers:
        breathing  3 1 top (1.0, 0.18, 0.0, 0.0)


[led_effect sb_nozzle_cooling]
autostart:              false
frame_rate:             24
leds:
    neopixel:T0_leds (2,3)
layers:
        breathing  3 1 top (0.0, 0.0, 1.0, 0.1)


[led_effect sb_nozzle_standby]
autostart:              false
frame_rate:             24
leds:
    neopixel:T0_leds (2,3)
layers:
        breathing  3 1 top (0.6, 0.0, 0.0, 0.0)


[led_effect sb_nozzle_part_ready]
autostart:              false
frame_rate:             24
leds:
    neopixel:T0_leds (2,3)
layers:
        breathing  3 1 top (0.6, 1.0, 0.0, 0.1)
#####################
## all led effects ##
#####################


[led_effect sb_critical_error]
leds:
    neopixel:chamber_leds
layers:
    strobe         1  1.5   add        (1.0,  1.0, 1.0)
    breathing      2  0     difference (0.95, 0.0, 0.0)
    static         1  0     top        (1.0,  0.0, 0.0)
autostart:                             false
frame_rate:                            24
run_on_error:                          true




[led_effect rainbow]
leds:
    neopixel:T0_leds
autostart:                          true
frame_rate:                         24
layers:
    gradient  0.3  1 add (0.3, 0.0, 0.0),(0.0, 0.3, 0.0),(0.0, 0.0, 0.3)
#######################
# LED Effects Statics #
#######################


[led_effect set_nozzle_leds]
leds:
    neopixel:T0_leds (2,3)
   #neopixel:caselight
autostart:                          false
frame_rate:                         24
layers:
    static         0  0     top        (1.0,  1.0, 1.0)


[led_effect set_logo_leds]
leds:
    neopixel:T0_leds (1)
autostart:                          false
frame_rate:                         24
layers:
    static         0  0     top        (1.0,  1.0, 1.0)
[led_effect set_logo1_leds]
leds:
    neopixel:_T1_leds (1)
autostart:                          false
frame_rate:                         24
layers:
    static         0  0     top        (1.0,  1.0, 1.0)

##############
# The Macros #
##############


[gcode_macro set_logo_leds_off]
gcode:
    {% if printer["gcode_macro which_tool_led"].tool2 == 0 %}
    SET_LED_EFFECT EFFECT=set_logo_leds STOP=1
    {% elif printer["gcode_macro which_tool_led"].tool2 == 1 %}
    SET_LED_EFFECT EFFECT=set_logo1_leds STOP=1
    {% endif %}

[gcode_macro set_logo_leds_on]
gcode:
    {% if printer["gcode_macro which_tool_led"].tool2 == 0 %}
    SET_LED_EFFECT EFFECT=set_logo_leds
    {% elif printer["gcode_macro which_tool_led"].tool2 == 1 %}
    SET_LED_EFFECT EFFECT=set_logo1_leds
    {% endif %}


[gcode_macro test_critical_error]
gcode:
    SET_LED_EFFECT EFFECT=sb_critical_error
    
[gcode_macro set_nozzle_leds_on]
gcode:
    SET_LED_EFFECT EFFECT=set_nozzle_leds


[gcode_macro set_nozzle_leds_off]
gcode:
    SET_LED_EFFECT EFFECT=set_nozzle_leds STOP=1


[gcode_macro status_off]
gcode:
    STOP_LED_EFFECTS


[gcode_macro status_ready]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=rainbow


[gcode_macro status_part_ready]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_nozzle_part_ready
    SET_LED_EFFECT EFFECT=sb_logo_part_ready


[gcode_macro status_busy]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_logo_busy TOOL="T0_leds"
    set_nozzle_leds_on


[gcode_macro status_heating]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_logo_heating
    SET_LED_EFFECT EFFECT=sb_nozzle_heating


[gcode_macro status_cooling]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_logo_cooling
    SET_LED_EFFECT EFFECT=sb_nozzle_cooling




[gcode_macro status_leveling]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=leveling
    set_nozzle_leds_on


[gcode_macro status_homing]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=homing
    set_nozzle_leds_on


[gcode_macro status_cleaning]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_logo_cleaning
    set_nozzle_leds_on


[gcode_macro status_meshing]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=meshing
    set_nozzle_leds_on


[gcode_macro status_calibrating_z]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=calibrating_z
    set_nozzle_leds_on


[gcode_macro status_printing]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=sb_logo_printing
    set_nozzle_leds_on