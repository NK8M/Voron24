# diag_pin: PF3
# run_current: 0.800
# stealthchop_threshold: 999999

[tmc2209 stepper_y]
uart_pin: PB5
run_current: 0.800
stealthchop_threshold: 0
sense_resistor: 0.110
diag_pin: PF1
driver_SGTHRS: 60

# [tmc2209 stepper_y1]
