max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_x]
uart_pin: PC13
diag_pin: PF4
run_current: 0.800
stealthchop_threshold: 999999

[tmc2209 stepper_x1]
uart_pin: PE3
diag_pin: PF3
run_current: 0.800
stealthchop_threshold: 999999

[tmc2209 stepper_y]
uart_pin: PB9
diag_pin: PF2
run_current: 0.800
stealthchop_threshold: 999999
[tmc2209 stepper_y1]
uart_pin: PB5
diag_pin: PF1
run_current: 0.800
stealthchop_threshold: 999999

[tmc2209 stepper_z]
uart_pin: PG14
#diag_pin: PF5
run_current: 0.650
stealthchop_threshold: 999999
[tmc2209 stepper_z1]
uart_pin: PG10
#diag_pin: PF5
run_current: 0.650
stealthchop_threshold: 999999
[tmc2209 stepper_z2]
uart_pin: PD5
#diag_pin: PF5
run_current: 0.650
stealthchop_threshold: 999999
[tmc2209 stepper_z3]
uart_pin: PC6
#diag_pin: PF5
run_current: 0.650
stealthchop_threshold: 999999

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE9, EXP1_2=PE10,
    EXP1_3=PE11, EXP1_4=PE12,
    EXP1_5=PE13, EXP1_6=PE14,    # Slot in the socket on this side
    EXP1_7=PE15, EXP1_8=PB10,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PB14, EXP2_2=PB13,
    EXP2_3=PF7, EXP2_4=PB12,
    EXP2_5=PE7, EXP2_6=PB11,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

