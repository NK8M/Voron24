[include fluidd.cfg]
[include toolchanger/readonly-configs/toolchanger-include.cfg]
[include cartographer.cfg]

# See docs/Config_Reference.md for a description of parameters.
[exclude_object]

# Enable arcs support
[gcode_arcs]
resolution: 0.3
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
# endstop_pin: ^PF4
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 400
position_max: 400
homing_speed: 80
homing_retract_dist: 0
homing_positive_dir: true

# [stepper_x1]
# step_pin: PE2
# dir_pin: PE1
# enable_pin: !PE4
# microsteps: 16
# rotation_distance: 40

[stepper_y]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB6
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
# endstop_pin: ^PF4
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 400
position_max: 400
homing_speed: 80
homing_retract_dist: 0
homing_positive_dir: true

# [stepper_y1]
# step_pin: PB8
# dir_pin: PB7
# enable_pin: !PE0
# microsteps: 16
# rotation_distance: 40

[stepper_z]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16
##UNCOMMENT THE BELOW LINE WHEN CARTO IS AVAILABLE
endstop_pin: probe:z_virtual_endstop
##COMMENT OUT THE NEXT TWO LINES ONCE CARTO IS AVAILABLE
# endstop_pin: !PF0
# position_endstop: 0
homing_retract_dist: 0
position_max: 400

[stepper_z1]
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16

[stepper_z2]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16

[stepper_z3]
step_pin: PC7
dir_pin: PC8
enable_pin: !PD2
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16

[heater_bed]
heater_pin: PF5
sensor_type: Generic 3950
sensor_pin: PB1 # TB
control: watermark
min_temp: -100  ########## FIX ME 
max_temp: 130


# Controller fan for MCU / stepper drivers
[temperature_fan Manta_M8P]
pin: PF7                       # Replace with your actual fan control pin
sensor_type: temperature_mcu   # Use MCU's internal temperature sensor
control: watermark             # Simple on/off or stepped control
min_temp: 0                    # Fan won't run below this temp
max_temp: 80                   # Safety cutoff
target_temp: 50                # Fan starts ramping up here
max_speed: 1.0                 # Full speed (1.0 = 100%)
min_speed: 0.3                 # Minimum speed when active (30%)
kick_start_time: 0.5           # Burst at full speed to start spinning
shutdown_speed: 0              # Fan stops when below target_temp


#[heater_fan fan2]
#pin: PC12

#[heater_fan fan3]
#pin: PE5

#[heater_fan fan4]
#pin: PE4

#[heater_fan fan5]
