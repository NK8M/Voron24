[include fluidd.cfg]
#[include toolchanger/readonly-configs/toolchanger-include.cfg]

# See docs/Config_Reference.md for a description of parameters.
[exclude_object]

# Enable arcs support
[gcode_arcs]
resolution: 0.3

[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PF4
position_endstop: 400
position_max: 400
homing_speed: 50

[stepper_x1]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 40

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 16
rotation_distance: 40
endstop_pin: ^PF2
position_endstop: 400
position_max: 400
homing_speed: 50

[stepper_y1]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB6
microsteps: 16
rotation_distance: 40

[stepper_z]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
position_endstop: 0
position_max: 400

[stepper_z1]
step_pin: PG9
dir_pin: !PD7
enable_pin: !PG11
microsteps: 16
rotation_distance: 8

[stepper_z2]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 16
rotation_distance: 8

[stepper_z3]
step_pin: PC7
dir_pin: !PC8
enable_pin: !PD2
microsteps: 16
rotation_distance: 8

