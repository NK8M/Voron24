[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_1A0014000951313339373836-if00

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 1000
max_z_velocity: 120
max_z_accel: 1000

########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_x]
uart_pin: PC13
run_current: 0.800
stealthchop_threshold: 0
sense_resistor: 0.110
diag_pin: PF4
driver_SGTHRS:60
# [tmc2209 stepper_x1]
