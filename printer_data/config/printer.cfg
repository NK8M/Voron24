[temperature_sensor CM4]
sensor_type: temperature_host
min_temp: 0
max_temp: 70

[temperature_sensor BTT_Manta_M8P]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 70

[quad_gantry_level]
gantry_corners:
	-60,-10
	360,370
points:
	50,25
	50,225
	250,225
	250,25

#--------------------------------------------------------------------
speed: 300
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10