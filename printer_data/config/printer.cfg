[include fluidd.cfg]
[include toolchanger/readonly-configs/toolchanger-include.cfg]
[include cartographer.cfg]
# See docs/Config_Reference.md for a description of parameters.
[exclude_object]

# Enable arcs support
[gcode_arcs]
resolution: 0.3
[force_move]
enable_force_move: true
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
# endstop_pin: ^PF4
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 400
position_max: 400
homing_speed: 50
homing_retract_dist: 0
homing_positive_dir: true

# [stepper_x1]
# step_pin: PE2
# dir_pin: PE1
# enable_pin: !PE4
# microsteps: 16
# rotation_distance: 40

[stepper_y]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB6
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
# endstop_pin: ^PF4
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 400
position_max: 400
homing_speed: 50
homing_retract_dist: 0
homing_positive_dir: true
# [stepper_y1]
# step_pin: PB4
# dir_pin: PB3
# enable_pin: !PB6
# microsteps: 16
# rotation_distance: 40

[stepper_z]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16
##UNCOMMENT THE BELOW LINE WHEN CARTO IS AVAILABLE
endstop_pin: probe:z_virtual_endstop
##COMMENT OUT THE NEXT TWO LINES ONCE CARTO IS AVAILABLE
# endstop_pin: !PF0
# position_endstop: 0
homing_retract_dist: 0
position_max: 400

[stepper_z1]
step_pin: PG9
dir_pin: !PD7
enable_pin: PG11
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16

[stepper_z2]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16

[stepper_z3]
step_pin: PC7
dir_pin: PC8
enable_pin: !PD2
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16

[heater_bed]
heater_pin: PF5
sensor_type: Generic 3950
sensor_pin: PB1 # TB
control: watermark
min_temp: -100  ########## FIX ME 
max_temp: 130


# Controller fan for MCU / stepper drivers
[temperature_fan Manta_M8P]
pin: PF7                       # Replace with your actual fan control pin
sensor_type: temperature_mcu   # Use MCU's internal temperature sensor
control: watermark             # Simple on/off or stepped control
min_temp: 0                    # Fan won't run below this temp
max_temp: 80                   # Safety cutoff
target_temp: 50                # Fan starts ramping up here
max_speed: 1.0                 # Full speed (1.0 = 100%)
min_speed: 0.3                 # Minimum speed when active (30%)
kick_start_time: 0.5           # Burst at full speed to start spinning
shutdown_speed: 0              # Fan stops when below target_temp


#[heater_fan fan2]
#pin: PC12

#[heater_fan fan3]
#pin: PE5

#[heater_fan fan4]
#pin: PE4

#[heater_fan fan5]
#pin: PB8
#tachometer_pin: PC14

#[heater_fan fan6]
#pin: PB9
#tachometer_pin: PC15

#[heater_fan SoC_fan]
#pin: CB1:gpio79
#pin: RPI:gpio26

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_1A0014000951313339373836-if00

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 300
max_z_accel: 3000

########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_x]
uart_pin: PC13
run_current: 0.800
stealthchop_threshold: 0
sense_resistor: 0.110
diag_pin: PF4
driver_SGTHRS: 75
# [tmc2209 stepper_x1]
# uart_pin: PE3
# diag_pin: PF3
# run_current: 0.800
# stealthchop_threshold: 999999

[tmc2209 stepper_y]
uart_pin: PB5
run_current: 0.800
stealthchop_threshold: 0
sense_resistor: 0.110
diag_pin: PF1
driver_SGTHRS: 75

# [tmc2209 stepper_y1]
# uart_pin: PB5
# diag_pin: PF1
# run_current: 0.800
# stealthchop_threshold: 999999

[tmc2209 stepper_z]
uart_pin: PG14
#diag_pin: PF5
run_current: 0.650
stealthchop_threshold: 999999
[tmc2209 stepper_z1]
uart_pin: PG10
#diag_pin: PF5
run_current: 0.650
stealthchop_threshold: 999999
[tmc2209 stepper_z2]
uart_pin: PD5
#diag_pin: PF5
run_current: 0.650
stealthchop_threshold: 999999
[tmc2209 stepper_z3]
uart_pin: PC6
#diag_pin: PF5
run_current: 0.650
stealthchop_threshold: 999999

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE9, EXP1_2=PE10,
    EXP1_3=PE11, EXP1_4=PE12,
    EXP1_5=PE13, EXP1_6=PE14,    # Slot in the socket on this side
    EXP1_7=PE15, EXP1_8=PB10,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PB14, EXP2_2=PB13,
    EXP2_3=PF7, EXP2_4=PB12,
    EXP2_5=PE7, EXP2_6=PB11,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

# See the sample-lcd.cfg file for definitions of common LCD displays.

#[output_pin ps_on_pin]
#pin: PC3

#[output_pin pc13_pin]
#pin: PC13

#[neopixel my_neopixel_1]
#pin: PA9

#[neopixel my_neopixel_2]
#pin: PB15

#[adxl345]
#cs_pin: PC4
#spi_bus: spi1
[temperature_sensor CM4]
sensor_type: temperature_host
min_temp: 0
max_temp: 70


[quad_gantry_level]
gantry_corners:
	-27,-67
	427,467
points:
	50,25
	50,320
	320,320
	320,25

#--------------------------------------------------------------------
speed: 300
horizontal_move_z: 3
retries: 5
retry_tolerance: 0.01
max_adjust: 15

