# This file contains common pin mappings for the BIGTREETECH EBBT1
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu EBBT1]
canbus_uuid: 687d35214e13
# python3 ~/katapult/scripts/flashtool.py -i can0 -u 53af41a9474e -r
# python3 ~/katapult/scripts/flashtool.py -i can0 -u 53af41a9474e -f ~/klipper/out/klipper.bin
[adxl345 T1]
cs_pin: EBBT1: PB12
spi_software_sclk_pin: EBBT1: PB10
spi_software_mosi_pin: EBBT1: PB11
spi_software_miso_pin: EBBT1: PB2
axes_map: x,z,-y

[extruder1]
step_pin: EBBT1: PD0
dir_pin: EBBT1: PD1
enable_pin: !EBBT1: PD2
heater_pin: EBBT1: PB13
sensor_pin: EBBT1: PA3
sensor_type: ATC Semitec 104NT-4-R025H42G
full_steps_per_rotation: 200
microsteps: 16
gear_ratio: 9:1
rotation_distance: 46.537
nozzle_diameter: 0.400
filament_diameter: 1.750
control: pid
# pid_Kp: 26.963   #44.282 
# pid_Ki: 3.583   #18.451 
# pid_Kd: 50.723
min_temp: 0
max_temp: 300
max_extrude_only_distance: 150

[tmc2209 extruder1]
uart_pin: EBBT1: PA15
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

[heater_fan T1_hotend_fan]
pin: EBBT1: PA0
heater: extruder1
heater_temp: 50.0

[fan_generic T1_partfan]
pin: EBBT1: PA1

[gcode_macro T1]
variable_active: 0
variable_color: ""
gcode:
    SELECT_TOOL T=1


#change the tool numbers to the tool you are configuring, ie T1, T1, etc
[tool T1]
#change this too
tool_number: 1
detection_pin: !EBBT1:PB6
#if this were T1, then this would be extruder1, etc
extruder: extruder1
#Change T1_partfan to tool number
fan: T1_partfan
# Tool offset is 0.171875,-0.034375,-0.833750
# gcode_x_offset: 0.53
# gcode_y_offset: 0.96
gcode_x_offset: -0.030
gcode_y_offset: 1.010
gcode_z_offset: -0.260
#These are build specific, its where the tool is sititng in it's dock.
params_park_x: 100
params_park_y: -47.2
params_park_z: 364.5
# For InputShaper run per tool and enter the frequency here
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_x: 46.4
params_input_shaper_damping_ratio_x: 0.098
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 34.4
params_input_shaper_damping_ratio_y: 0.088

#####################################################################
# 	LEDS
#####################################################################

[neopixel sb_leds_t1]
pin: EBBT1:PD3
#   The pin connected to the neopixel. This parameter must be provided.
chain_count: 3
#   The number of Neopixel chips that are "daisy chained" to the
#   provided pin. The default is 1 (which indicates only a single
#   Neopixel is connected to the pin).
color_order: GRB
#   Set the pixel order required by the LED hardware. Options are GRB,
#   RGB, GRBW, or RGBW. The default is GRB.
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 1.0
#   Sets the initial LED color of the Neopixel. Each value should be
#   between 0.0 and 1.0. The WHITE option is only available on RGBW
#   LEDs. The default for each color is 0.#


#####################################################################
# 	LED Effects
#####################################################################


##################
## logo effects ##
##################

[led_effect sb_logo_busy_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (1)
layers:
    breathing  3 1 top (1,0,0)

[led_effect sb_logo_cleaning_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (1)
layers:
    breathing  3 1 top (0.0, 0.02, 0.5)

[led_effect sb_logo_calibrating_z_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (1)
layers:
        breathing  3 1 top (0.0, 0.0, 0.35)

[led_effect sb_logo_heating_t1]
leds:
    neopixel:sb_leds_t1 (1)
autostart:                          false
frame_rate:                         24
layers:
     breathing  3 1 top (1, 0.18, 0)

[led_effect sb_logo_cooling_t1]
leds:
    neopixel:sb_leds_t1 (1)
autostart:                          false
frame_rate:                         24
layers:
     breathing  3 1 top (0, 0, 1)

[led_effect sb_logo_homing_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (1)
layers:
    strobe         1  1.5   add        (1.0,  0.25, 0.0)
    breathing      2  0     difference (1.0, 0.25, 0.0)
    static         1  0     top        (0.0,  0.0, 0.0)


[led_effect sb_logo_leveling_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (1)
layers:
        breathing  3 1 top (0.5, 0.1, 0.4)

[led_effect sb_logo_meshing_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (1)
layers:
        breathing  3 1 top (0.2, 1.0, 0.0)

[led_effect sb_logo_printing_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (1)
layers:
    gradient  0.3  1 add (0.3, 0.0, 0.0),(0.3, 0.3, 0.0),(0.3, 0.1, 0.0)

[led_effect sb_logo_standby_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (1)
layers:
        breathing  3 1 top (0.01, 0.01, 0.01)

[led_effect sb_logo_part_ready_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (1)
layers:
        breathing  3 1 top (0.0, 1.0, 0.0)

[led_effect sb_logo_docking_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (1)
layers:
    gradient  1  1 add (0.0, 0.0, 0.0),(0.5, 0.5, 0.0),(1.0, 1.0, 0.0)
    
####################
## nozzle effects ##
