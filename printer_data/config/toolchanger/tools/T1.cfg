#####################
## all led effects ##
#####################

[led_effect sb_critical_error_t1]
leds:
    neopixel:sb_leds_t1
layers:
    strobe         1  1.5   add        (1.0,  1.0, 1.0)
    breathing      2  0     difference (0.95, 0.0, 0.0)
    static         1  0     top        (1.0,  0.0, 0.0)
autostart:                             false
frame_rate:                            24
run_on_error:                          true


[led_effect rainbow_t1]
leds:
    neopixel:sb_leds_t1
autostart:                          false
frame_rate:                         24
layers:
    gradient  0.3  1 add (0.3, 0.0, 0.0),(0.0, 0.3, 0.0),(0.0, 0.0, 0.3)


#######################
# LED Effects Statics #
#######################

[led_effect set_nozzle_leds_t1]
leds:
    neopixel:sb_leds_t1 (2,3)
   #neopixel:caselight
autostart:                          true
frame_rate:                         24
layers:
    static         0  0     top        (1.0,  1.0, 1.0)

[led_effect set_logo_leds_t1]
leds:
    neopixel:sb_leds_t1 (1)
autostart:                          true
frame_rate:                         24
layers:
    static         0  0     top        (1.0,  0.0, 1.0)