frame_rate:             24
leds:
    neopixel:sb_leds_t1 (2,3)
layers:
        breathing  3 1 top (0.0, 0.0, 1.0, 0.1)

[led_effect sb_nozzle_standby_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (2,3)
layers:
        breathing  3 1 top (0.6, 0.0, 0.0, 0.0)

[led_effect sb_nozzle_part_ready_t1]
autostart:              false
frame_rate:             24
leds:
    neopixel:sb_leds_t1 (2,3)
layers:
